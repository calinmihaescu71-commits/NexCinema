<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Story | AI Cinema</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #f5f5f5;
            --accent-color: #7b61ff; 
            --accent-hover: #634be3;
            --card-bg: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-color);
            text-decoration: none;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--accent-color);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        .series-header {
            padding: 150px 5% 50px;
            text-align: center;
            background: radial-gradient(circle at center, rgba(123, 97, 255, 0.1) 0%, rgba(13, 13, 13, 1) 70%);
        }

        .series-header h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            font-weight: 800;
        }

        .series-header h1 span {
            color: var(--accent-color);
        }

        .series-header p {
            color: #b3b3b3;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .episodes-container {
            padding: 2rem 5% 6rem;
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .episode-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .episode-card:hover {
            transform: translateY(-8px);
            border-color: rgba(123, 97, 255, 0.4);
        }

        .episode-video {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
            display: block;
        }

        .episode-info {
            padding: 1.5rem;
        }

        .episode-info h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        .episode-info p {
            font-size: 0.9rem;
            color: #888;
        }

        footer {
            text-align: center;
            padding: 2rem;
            background-color: #0a0a0a;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .series-header h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="../index.html" class="logo">AI<span>Cinema</span></a>
        <div class="nav-links">
            <a href="../index.html#home">Home</a>
            <a href="../index.html#features">Features</a>
            <a href="../index.html#movies">Movies</a>
        </div>
        <div style="width: 100px;"></div> 
    </nav>

    <header class="series-header">
        <h1>Blood <span>Story</span></h1>
        <p>Watch the complete series from beginning to end. Experience the evolution of the ultimate sci-fi action drama.</p>
    </header>

    <main class="episodes-container">
        <div class="episodes-grid">
            
            <div class="episode-card">
                <video class="episode-video" src="../Videos/Sange Story/EP1.mp4" controls playsinline preload="metadata"></video>
                <div class="episode-info">
                    <h3>Episode 1</h3>
                    <p>The Beginning</p>
                </div>
            </div>

            <div class="episode-card">
                <video class="episode-video" src="../Videos/Sange Story/EP2.mp4" controls playsinline preload="metadata"></video>
                <div class="episode-info">
                    <h3>Episode 2</h3>
                    <p>The Escalation</p>
                </div>
            </div>

            <div class="episode-card">
                <video class="episode-video" src="../Videos/Sange Story/EP3.mp4" controls playsinline preload="metadata"></video>
                <div class="episode-info">
                    <h3>Episode 3</h3>
                    <p>The Climax</p>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 AI Cinema. All rights reserved.</p>
    </footer>

    <script>
        const videos = document.querySelectorAll('video');
        videos.forEach(video => {
            video.addEventListener('play', () => {
                videos.forEach(v => {
                    if (v !== video) {
                        v.pause();
                    }
                });
            });
        });
    </script>
</body>
</html>
